services:
  # Navidrome media server for testing
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome-e2e-test
    ports:
      - '4533:4533'
    environment:
      # Auto-create admin user for testing (username: admin)
      - ND_DEVAUTOCREATEADMINPASSWORD=test_password_123

      # Core configuration
      - ND_MUSICFOLDER=/music
      - ND_DATAFOLDER=/data
      - ND_LOGLEVEL=debug

      # Behavior settings
      - ND_SCANONSTARTUP=true
      - ND_SESSIONTIMEOUT=24h

      # Disable external services for isolated testing
      - ND_ENABLEEXTERNALSERVICES=false
    volumes:
      - ./fixtures/music:/music
      - navidrome-data:/data
    healthcheck:
      test: ['CMD', 'wget', '--spider', 'http://localhost:4533/ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - e2e-test-network

  # Rsync daemon for file transfer testing
  rsync-daemon:
    build:
      context: ./rsync
    container_name: rsync-e2e-test
    ports:
      - '12000:873'
    volumes:
      - rsync-music:/data
    networks:
      - e2e-test-network

  # djmgmt test runner
  djmgmt-test:
    build:
      context: ../
      dockerfile: e2e/Dockerfile.test
    container_name: djmgmt-e2e-test
    depends_on:
      navidrome:
        condition: service_healthy
      rsync-daemon:
        condition: service_started
    environment:
      # Navidrome connection
      - NAVIDROME_HOST=navidrome
      - NAVIDROME_PORT=4533
      - NAVIDROME_USERNAME=admin
      - NAVIDROME_PASSWORD=test_password_123
      - NAVIDROME_CLIENT_ID=e2e_test_client

      # Rsync connection
      - RSYNC_HOST=rsync-daemon
      - RSYNC_PORT=873
      - RSYNC_USER=testuser
      - RSYNC_MODULE=data
      - RSYNC_PASSWORD=testpass

      # djmgmt configuration
      - DJMGMT_STATE_DIR=/tmp/djmgmt/state
      - DJMGMT_LOG_DIR=/tmp/djmgmt/logs
      - REKORDBOX_ROOT=file://localhost
    volumes:
      - .:/e2e
      - djmgmt-state:/tmp/djmgmt
      - ./logs:/tmp/djmgmt/logs
    networks:
      - e2e-test-network

volumes:
  navidrome-data:
  rsync-music:
  djmgmt-state:

networks:
  e2e-test-network:
    driver: bridge
